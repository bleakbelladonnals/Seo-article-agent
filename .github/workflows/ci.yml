name: CI

on:
  push:
    branches: [main, master, todo-implementation]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          DEEPSEEK_API_KEY: test-key
          VISION_MODEL_NAME: mock-vision
          VISION_API_KEY: mock-key
          VISION_BASE_URL: https://mock.api/v1
          API_TOKEN: test-token-ci
          MODEL_NAME: deepseek-chat
        run: |
          python tests/test_utils.py
          python tests/test_server.py

      - name: Check imports
        env:
          DEEPSEEK_API_KEY: test-key
          VISION_MODEL_NAME: mock-vision
          VISION_API_KEY: mock-key
        run: python -c "import config; import crew; print('imports OK')"
